apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pleme-lib.fullname" . }}
  namespace: {{ include "pleme-lib.namespace" . }}
  labels:
    {{- include "pleme-lib.labels" . | nindent 4 }}
  {{- $resAnnotations := include "pleme-lib.resourceAnnotations" . }}
  {{- if $resAnnotations }}
  annotations:
    {{- $resAnnotations | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "pleme-lib.fullname" . }}-headless
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "pleme-lib.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pleme-lib.selectorLabels" . | nindent 8 }}
        app: {{ include "pleme-lib.fullname" . }}
      annotations:
        {{- include "pleme-lib.prometheusAnnotations" . | nindent 8 }}
        {{- include "pleme-lib.istioAnnotations" . | nindent 8 }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "pleme-lib.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "pleme-lib.podSecurityContext" . | nindent 8 }}
      containers:
        - name: {{ include "pleme-lib.name" . }}
          image: {{ include "pleme-lib.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or (.Values.downwardApi).enabled (gt (len (.Values.env | default list)) 0) }}
          env:
            {{- if (.Values.downwardApi).enabled }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- include "pleme-lib.containerSecurityContext" . | nindent 12 }}
          livenessProbe:
            {{- include "pleme-lib.livenessProbe" . | nindent 12 }}
          readinessProbe:
            {{- include "pleme-lib.readinessProbe" . | nindent 12 }}
          {{- if (.Values.startupProbe).enabled }}
          startupProbe:
            {{- include "pleme-lib.startupProbe" . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if (.Values.persistence).enabled }}
            - name: data
              mountPath: {{ (.Values.persistence).mountPath | default "/data" }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if (.Values.persistence).enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "pleme-lib.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml ((.Values.persistence).accessModes | default (list "ReadWriteOnce")) | nindent 10 }}
        {{- if (.Values.persistence).storageClass }}
        storageClassName: {{ (.Values.persistence).storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ (.Values.persistence).size | default "10Gi" }}
  {{- end }}
