suite: statefulset tests
templates:
  - templates/statefulset.yaml
tests:
  - it: should render a StatefulSet
    asserts:
      - isKind:
          of: StatefulSet

  - it: should use the correct image
    set:
      image.repository: ghcr.io/pleme-io/mathscape
      image.tag: v0.1.0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/pleme-io/mathscape:v0.1.0"

  - it: should mount data volume at /data
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should mount tmp volume at /tmp
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp

  - it: should set resource limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 2Gi

  - it: should set security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: should set pod security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: should create volumeClaimTemplate with correct size
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 10Gi
      - contains:
          path: spec.volumeClaimTemplates[0].spec.accessModes
          content: ReadWriteOnce

  - it: should allow custom storage size
    set:
      persistence.size: 50Gi
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 50Gi

  - it: should allow custom storage class
    set:
      persistence.storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: fast-ssd

  - it: should set serviceName to headless service
    release:
      name: mathscape
    asserts:
      - equal:
          path: spec.serviceName
          value: mathscape-headless

  - it: should set default replica count to 1
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should expose http and metrics container ports
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 8080
            protocol: TCP
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9090
            protocol: TCP

  - it: should set environment variables
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RUST_LOG
            value: "info,mathscape=debug"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATA_DIR
            value: "/data"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_FORMAT
            value: "json"

  - it: should include tmp emptyDir volume
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}

  - it: should not create volumeClaimTemplate when persistence is disabled
    set:
      persistence.enabled: false
    asserts:
      - isNull:
          path: spec.volumeClaimTemplates
