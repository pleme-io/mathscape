suite: service tests
templates:
  - templates/service.yaml
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service

  - it: should be ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose http and health ports
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: health
            port: 8080
            targetPort: health
            protocol: TCP
